<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--nav-w:216px;--hdr-h:56px;--radius:10px;--bg:#0f1117;--surface:#1a1d27;--surface2:#21253a;--surface3:#272d43;--border:#2a2d3a;--border2:#3a3f52;--accent:#6366f1;--accent2:#4f46e5;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--shadow:0 18px 60px rgba(0,0,0,.45)}
body.light{--bg:#f5f7fb;--surface:#ffffff;--surface2:#f1f5f9;--surface3:#e8eef7;--border:#d9e1ef;--border2:#b7c3d7;--accent:#4f46e5;--accent2:#4338ca;--green:#15803d;--amber:#9a5b00;--red:#b91c1c;--blue:#1d4ed8;--text:#0f172a;--text2:#475569;--text3:#64748b;--shadow:0 18px 50px rgba(15,23,42,.18)}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}
button,input,select,textarea{font-family:inherit}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;width:100%;outline:none}
textarea{resize:vertical;min-height:70px;line-height:1.35;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent),transparent 72%)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
button{cursor:pointer;font-size:13px;border-radius:6px;padding:7px 12px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);transition:background .12s,border-color .12s,transform .05s;white-space:nowrap}
button:hover{background:var(--surface3);border-color:var(--accent)}
button:active{transform:translateY(1px)}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
button.primary:hover{background:var(--accent2)}
button.danger{border-color:var(--red);color:var(--red);background:transparent}
button.danger:hover{background:color-mix(in srgb,var(--red),transparent 88%)}
button.success{border-color:var(--green);color:var(--green);background:transparent}
button.small{font-size:12px;padding:4px 8px}
button.ghost{background:transparent;border-color:transparent;color:var(--text2)}
button.ghost:hover{border-color:var(--border2);color:var(--text)}
button:disabled{opacity:.45;cursor:not-allowed}
hr{border:none;border-top:1px solid var(--border);margin:12px 0}
#hdr{height:var(--hdr-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:12px;flex-shrink:0;z-index:100}
#hdr h1{font-size:16px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:8px;min-width:160px}
.logo{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--blue));display:inline-block}
#hdr .ctx{display:flex;align-items:center;gap:8px;margin-left:auto;min-width:0}
#hdr .ctx label{margin:0;font-size:11px;white-space:nowrap;color:var(--text2)}
#hdr .ctx select{width:auto;min-width:118px;max-width:170px;padding:5px 8px;font-size:12px}
.status-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border2);background:var(--surface2);border-radius:999px;padding:5px 10px;font-size:12px;color:var(--text2)}
.status-pill.saved{border-color:color-mix(in srgb,var(--green),transparent 45%);color:var(--green)}
.status-pill.unsaved{border-color:color-mix(in srgb,var(--amber),transparent 35%);color:var(--amber)}
.status-dot{width:8px;height:8px;border-radius:999px;background:currentColor;display:inline-block}
#body{display:flex;flex:1;overflow:hidden}
#nav{width:var(--nav-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:auto}
.nav-item{padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text2);font-size:13px;border-left:3px solid transparent;transition:.12s}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--surface2)}
.nav-item .num{font-size:11px;color:var(--text3);width:16px;text-align:right}
.nav-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);display:flex;flex-direction:column;gap:6px}
#content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.active{display:flex}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.toolbar input{max-width:260px}.toolbar select{width:auto;min-width:150px;max-width:240px}
.page-scroll{flex:1;overflow:auto;padding:18px}
.grid{display:grid;gap:12px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card h3{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.45px}
.card h4{font-size:14px;margin-bottom:10px;color:var(--text)}
.muted{color:var(--text2)}.tiny{font-size:11px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:13px;text-align:center}
.stat.clickable{cursor:pointer}.stat.clickable:hover{background:var(--surface3);border-color:var(--accent)}
.stat .num{font-size:26px;font-weight:800;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.stat .lbl{font-size:11px;color:var(--text2);margin-top:2px}
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:8px;background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}th{background:var(--surface2);color:var(--text2);font-weight:700;position:sticky;top:0;z-index:5}tr:hover td{background:color-mix(in srgb,var(--surface2),transparent 45%)}tr.selected td{background:color-mix(in srgb,var(--accent),transparent 88%)}th.sortable{cursor:pointer}th.sortable:hover{color:var(--accent)}
.row-actions{display:flex;gap:5px;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);font-size:11px;color:var(--text2);margin:1px}.pill.green{color:var(--green);border-color:color-mix(in srgb,var(--green),transparent 55%)}.pill.amber{color:var(--amber);border-color:color-mix(in srgb,var(--amber),transparent 55%)}.pill.red{color:var(--red);border-color:color-mix(in srgb,var(--red),transparent 55%)}.pill.blue{color:var(--blue);border-color:color-mix(in srgb,var(--blue),transparent 55%)}
.form-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}.col-2{grid-column:span 2}.col-3{grid-column:span 3}.col-4{grid-column:span 4}.col-5{grid-column:span 5}.col-6{grid-column:span 6}.col-8{grid-column:span 8}.col-12{grid-column:span 12}
.switchline{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.switchline input[type=checkbox]{width:auto}.inline-check{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:12px}.inline-check input{width:auto}
.split{display:grid;grid-template-columns:320px minmax(0,1fr);gap:12px;align-items:start}.side-list{max-height:calc(100vh - 180px);overflow:auto}.list-row{padding:9px 10px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;gap:8px}.list-row:hover{background:var(--surface2)}.list-row.active{background:color-mix(in srgb,var(--accent),transparent 88%);color:var(--accent)}
.tabbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}.tabbar button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.helpbox{background:color-mix(in srgb,var(--blue),transparent 90%);border:1px solid color-mix(in srgb,var(--blue),transparent 60%);border-radius:8px;padding:10px;color:var(--text2);font-size:12px;margin-bottom:12px}
.warningbox{background:color-mix(in srgb,var(--amber),transparent 90%);border:1px solid color-mix(in srgb,var(--amber),transparent 55%);border-radius:8px;padding:10px;color:var(--amber);font-size:12px;margin-bottom:12px}
.dangerbox{background:color-mix(in srgb,var(--red),transparent 90%);border:1px solid color-mix(in srgb,var(--red),transparent 55%);border-radius:8px;padding:10px;color:var(--red);font-size:12px;margin-bottom:12px}
.check-tree{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface)}.check-row{display:grid;grid-template-columns:42px 40px 90px minmax(200px,1fr) minmax(130px,260px) 190px;align-items:center;gap:6px;padding:7px 8px;border-bottom:1px solid var(--border);min-height:38px}.check-row:hover{background:var(--surface2)}.check-row.drag-over{outline:2px solid var(--accent);outline-offset:-2px}.drag-handle{cursor:grab;color:var(--text3);font-size:18px;letter-spacing:-4px;user-select:none}.check-row input[type=checkbox]{width:auto}.check-num{color:var(--text2);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px}.source-text{color:var(--text3);font-size:11px}.indent-pad{display:inline-block}.linkish{color:var(--accent);cursor:pointer}.linkish:hover{text-decoration:underline}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;z-index:1000;padding:18px}.modal-backdrop.show{display:flex}.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;box-shadow:var(--shadow);width:min(980px,96vw);max-height:92vh;display:flex;flex-direction:column;overflow:hidden}.modal.small{width:min(560px,96vw)}.modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.modal-title{font-weight:800}.modal-body{padding:16px;overflow:auto}.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--surface);position:sticky;bottom:0}.close-x{border:none;background:transparent;color:var(--text2);font-size:20px;padding:2px 7px}.close-x:hover{color:var(--text)}
pre.output{white-space:pre-wrap;background:#050816;color:#dbeafe;border:1px solid #1e293b;border-radius:8px;padding:12px;max-height:430px;overflow:auto;font-size:12px;line-height:1.35}
body.light pre.output{background:#0f172a;color:#e2e8f0}
@media(max-width:1000px){#hdr{height:auto;min-height:var(--hdr-h);flex-wrap:wrap;padding:8px}.ctx{order:3;width:100%;overflow:auto}.split{grid-template-columns:1fr}.grid.two,.grid.three,.grid.four{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.col-2,.col-3,.col-4,.col-5,.col-6,.col-8,.col-12{grid-column:span 1}.check-row{grid-template-columns:32px 32px 70px minmax(160px,1fr);}.check-row .source-text,.check-row .row-actions{grid-column:4}}
</style>
</head>
<body>
<header id="hdr">
  <h1><span class="logo"></span>Endpoint Forge</h1>
  <div class="ctx">
    <label>Client</label><select id="ctxClient"></select>
    <label>Profile</label><select id="ctxProfile"></select>
    <label>Endpoint</label><select id="ctxEndpoint"></select>
    <label>Mode</label><select id="ctxMode"></select>
    <button id="themeBtn" class="small" title="Toggle light/dark mode">Dark</button>
    <button id="saveTop" class="primary small">Save Project</button>
    <span id="saveState" class="status-pill unsaved"><span class="status-dot"></span><span>Unsaved</span></span>
  </div>
</header>
<div id="body">
<nav id="nav">
  <div class="nav-item" data-page="dashboard"><span class="num">1</span><span>Dashboard</span></div>
  <div class="nav-item" data-page="clients"><span class="num">2</span><span>Clients</span></div>
  <div class="nav-item" data-page="profiles"><span class="num">3</span><span>Profiles</span></div>
  <div class="nav-item" data-page="endpoints"><span class="num">4</span><span>Endpoints</span></div>
  <div class="nav-item" data-page="items"><span class="num">5</span><span>Item Repository</span></div>
  <div class="nav-item" data-page="checklists"><span class="num">6</span><span>Checklists</span></div>
  <div class="nav-item" data-page="outputs"><span class="num">7</span><span>Generated Outputs</span></div>
  <div class="nav-item" data-page="settings"><span class="num">8</span><span>Settings</span></div>
  <div class="nav-footer"><button class="version-btn ghost" id="changeLogBtn">v8.0.0 Change Log</button><button class="version-btn ghost" id="pageContextBtn">Page Context</button><button class="version-btn ghost" id="licenseBtn">AGPL-3.0-or-later</button></div>
</nav>
<main id="content">
  <section id="page-dashboard" class="page"><div class="toolbar"><button id="openProjectBtn">Open .eforge</button><input id="openProjectInput" type="file" accept=".eforge,.json,application/json" hidden><button id="saveProjectDash" class="primary">Save Project</button><button id="saveProjectAsDash">Save As</button><button id="loadSampleBtn">Load Sample Data</button><button id="blankSlateBtn" class="danger">Blank Slate</button></div><div class="page-scroll" id="dashboardContent"></div></section>
  <section id="page-clients" class="page"><div class="toolbar"><button id="addClientBtn">Add Client</button><button id="cloneClientBtn">Clone</button><button id="deleteClientBtn" class="danger">Delete</button><button id="sortClientsBtn">Sort by Name</button><button id="saveClientsBtn" class="primary">Save Project</button></div><div class="page-scroll" id="clientsContent"></div></section>
  <section id="page-profiles" class="page"><div class="toolbar"><button id="addProfileBtn">Add Profile</button><button id="cloneProfileBtn">Clone to Client</button><button id="deleteProfileBtn" class="danger">Delete</button><button id="sortProfilesBtn">Sort by Name</button><button id="saveProfilesBtn" class="primary">Save Project</button></div><div class="page-scroll" id="profilesContent"></div></section>
  <section id="page-endpoints" class="page"><div class="toolbar"><button id="addEndpointBtn">Add Endpoint</button><button id="cloneEndpointBtn">Clone</button><button id="deleteEndpointBtn" class="danger">Delete</button><button id="sortEndpointsBtn">Sort by Name</button><button id="saveEndpointsBtn" class="primary">Save Project</button></div><div class="page-scroll" id="endpointsContent"></div></section>
  <section id="page-items" class="page"><div class="toolbar"><input id="itemSearch" placeholder="Search repository"><select id="itemFilterType"></select><select id="itemFilterStatus"></select><button id="addItemBtn">Add Item</button><button id="cloneItemBtn">Clone</button><button id="deleteItemBtn" class="danger">Delete</button><button id="saveItemsBtn" class="primary">Save Project</button></div><div class="page-scroll" id="itemsContent"></div></section>
  <section id="page-checklists" class="page"><div class="toolbar"><button id="addChecklistBtn">Add Manual Checklist</button><button id="addAutoChecklistBtn">Add Auto Checklist</button><button id="cloneChecklistBtn">Clone to Client</button><button id="deleteChecklistBtn" class="danger">Delete</button><button id="sortChecklistsBtn">Sort by Name</button><button id="saveChecklistsBtn" class="primary">Save Project</button></div><div class="page-scroll" id="checklistsContent"></div></section>
  <section id="page-outputs" class="page"><div class="toolbar"><button id="generateOutputsBtn" class="primary">Generate Preview</button><button id="downloadOutputsBtn">Download Outputs ZIP</button><button id="saveOutputsBtn" class="primary">Save Project</button></div><div class="page-scroll" id="outputsContent"></div></section>
  <section id="page-settings" class="page"><div class="toolbar"><button id="saveSettingsBtn" class="primary">Save Project</button></div><div class="page-scroll" id="settingsContent"></div></section>
</main>
</div>
<div id="modalHost" class="modal-backdrop" role="dialog" aria-modal="true"></div>
<script>
'use strict';
const VERSION = '8.0.0';
const ACTION_TYPES = ['precheck','install','configure','verify','repair','remediate','update','uninstall','offboard','rollback','audit','manual'];
const MODES = [
  {id:'build',name:'Build',actions:['precheck','install','configure','verify']},
  {id:'configure',name:'Configure',actions:['configure','verify']},
  {id:'remediate',name:'Remediate',actions:['repair','remediate','verify']},
  {id:'verify',name:'Verify',actions:['verify','audit']},
  {id:'offboard',name:'Offboard',actions:['uninstall','offboard','verify']},
  {id:'rollback',name:'Rollback',actions:['rollback','verify']},
  {id:'audit',name:'Audit',actions:['audit','verify']}
];
let project = blankProject();
let dirty = true;
let projectFileHandle = null;
let projectFileName = 'endpoint-forge.eforge';
let currentPage = 'dashboard';
let selected = {client:null, profile:null, endpoint:null, item:null, checklist:null, settingsTab:'operatingSystems'};
let itemSort = {key:'name', dir:1};
let outputCache = [];
let draggedChecklistId = null;

function el(id){return document.getElementById(id)}
function esc(v){return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uid(prefix='id'){return prefix+'-'+Math.random().toString(36).slice(2,8)+'-'+Date.now().toString(36).slice(-4)}
function clone(x){return JSON.parse(JSON.stringify(x))}
function byName(a,b){return String(a.name||'').localeCompare(String(b.name||''),undefined,{sensitivity:'base'})}
function ensureArray(v){return Array.isArray(v)?v:[]}
function normalizeId(s){return String(s||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || uid('id')}
function markDirty(){dirty=true; updateSaveState();}
function markSaved(){dirty=false; updateSaveState();}
function updateSaveState(){const p=el('saveState'); if(!p)return; p.className='status-pill '+(dirty?'unsaved':'saved'); p.innerHTML='<span class="status-dot"></span><span>'+(dirty?'Unsaved':'Saved')+'</span>';}
function currentClient(){return project.clients.find(c=>c.id===project.current.clientId) || project.clients[0] || null}
function currentProfile(){return project.profiles.find(p=>p.id===project.current.profileId) || project.profiles.find(p=>profileAppliesToClient(p, project.current.clientId)) || project.profiles[0] || null}
function currentEndpoint(){return project.endpoints.find(e=>e.id===project.current.endpointId) || project.endpoints.find(e=>e.clientId===project.current.clientId) || project.endpoints[0] || null}
function nameOf(list,id){const o=ensureArray(list).find(x=>x.id===id); return o?o.name:id}
function enabled(o){return o && o.enabled !== false}
function setPage(page, push=true){if(!el('page-'+page)) page='dashboard'; currentPage=page; document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); el('page-'+page).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.page===page)); if(push && location.hash.slice(1)!==page) history.pushState(null,'','#'+page); renderPage();}
window.addEventListener('hashchange',()=>setPage(location.hash.slice(1)||'dashboard',false));

function blankProject(){return {schemaVersion:VERSION,productName:'Endpoint Forge',preferences:{theme:'dark'},current:{clientId:'',profileId:'',endpointId:'',mode:'build'},global:{operatingSystems:[],scriptTypes:[],phases:[],itemTypes:[],categories:[],tags:[],items:[],checklists:[]},clients:[],profiles:[],endpoints:[],clientChecklists:[],secrets:[],logs:[]};}
function sampleProject(){const p=blankProject(); p.preferences.theme='dark';
 p.global.operatingSystems=[
  {id:'windows',name:'Windows',enabled:true,defaultScriptTypeId:'powershell'}, {id:'macos',name:'macOS',enabled:true,defaultScriptTypeId:'zsh'}, {id:'debian',name:'Debian/Ubuntu/Mint',enabled:true,defaultScriptTypeId:'bash'}, {id:'arch',name:'Arch Linux',enabled:true,defaultScriptTypeId:'bash'}, {id:'rhel',name:'Red Hat/Fedora/Rocky/Alma',enabled:true,defaultScriptTypeId:'bash'}];
 p.global.scriptTypes=[{id:'powershell',name:'PowerShell',extension:'ps1',enabled:true},{id:'batch',name:'Batch',extension:'cmd',enabled:true},{id:'bash',name:'Bash',extension:'sh',enabled:true},{id:'zsh',name:'Zsh',extension:'zsh',enabled:true},{id:'registry',name:'Registry',extension:'reg',enabled:true},{id:'text',name:'Text Runbook',extension:'txt',enabled:true}];
 p.global.phases=[{id:'preflight',name:'Preflight',order:10,enabled:true},{id:'install',name:'Install',order:20,enabled:true},{id:'configure',name:'Configure',order:30,enabled:true},{id:'verify',name:'Verify',order:40,enabled:true},{id:'offboard',name:'Offboard',order:80,enabled:true},{id:'rollback',name:'Rollback',order:90,enabled:true}];
 p.global.itemTypes=[{id:'application',name:'Application',enabled:true},{id:'browser-extension',name:'Browser Extension',enabled:true},{id:'registry-edit',name:'Registry Edit',enabled:true},{id:'scriptlet',name:'Scriptlet',enabled:true},{id:'browser-policy',name:'Browser Policy',enabled:true},{id:'manual-procedure',name:'Manual Procedure',enabled:true},{id:'verification-check',name:'Verification Check',enabled:true}];
 p.global.categories=[{id:'backup',name:'Backup',enabled:true},{id:'browser',name:'Browser',enabled:true},{id:'monitoring',name:'Monitoring',enabled:true},{id:'remote-access',name:'Remote Access',enabled:true},{id:'security',name:'Security',enabled:true},{id:'updates',name:'Updates',enabled:true}];

function emptyRules(tags=[],categories=[],itemTypes=[],phases=[],items=[]){return {include:{tagIds:tags,categoryIds:categories,itemTypeIds:itemTypes,phaseIds:phases,osIds:[],itemIds:items},exclude:{tagIds:[],categoryIds:[],itemTypeIds:[],phaseIds:[],osIds:[],itemIds:[]}};}
function itemObj(id,name,itemTypeId,categoryIds,tagIds,phaseIds,secrets,os){return {id,name,enabled:true,status:'active',description:'',notes:'',itemTypeId,categoryIds,tagIds,phaseIds,secrets,dependencies:[],risk:'medium',requiresAdmin:true,requiresReboot:false,sourceUrl:'',testedOs:'',os};}
function normalizeProject(p){p = p && typeof p==='object' ? p : blankProject(); p.schemaVersion=VERSION; p.productName=p.productName || 'Endpoint Forge'; p.preferences=p.preferences||{}; if(!p.preferences.theme)p.preferences.theme='dark'; p.current=p.current||{clientId:'',profileId:'',endpointId:'',mode:'build'}; p.global=p.global||{}; ['operatingSystems','scriptTypes','phases','itemTypes','categories','tags','items','checklists'].forEach(k=>{p.global[k]=ensureArray(p.global[k]);}); ['clients','profiles','endpoints','clientChecklists','secrets','logs'].forEach(k=>{p[k]=ensureArray(p[k]);}); p.global.items.forEach(it=>{it.enabled=it.enabled!==false; it.status=it.status||'active'; it.categoryIds=ensureArray(it.categoryIds); it.tagIds=ensureArray(it.tagIds); it.phaseIds=ensureArray(it.phaseIds); it.secrets=ensureArray(it.secrets); it.dependencies=ensureArray(it.dependencies); it.os=it.os||{}; Object.values(it.os).forEach(o=>{o.actions=o.actions||{}; o.disabled=!!o.disabled; o.manualProcess=!!o.manualProcess;});}); p.profiles.forEach(pr=>{pr.enabled=pr.enabled!==false; pr.clientIds=ensureArray(pr.clientIds); pr.rules=normalizeRules(pr.rules);}); p.endpoints.forEach(ep=>{ep.enabled=ep.enabled!==false; ep.overrides=ep.overrides||{}; ep.overrides.includeItemIds=ensureArray(ep.overrides.includeItemIds); ep.overrides.excludeItemIds=ensureArray(ep.overrides.excludeItemIds); ep.overrides.deprecatedItemIds=ensureArray(ep.overrides.deprecatedItemIds); ep.state=ep.state||{}; ep.state.itemStatus=ep.state.itemStatus||{}; ep.state.history=ensureArray(ep.state.history);}); [...p.global.checklists,...p.clientChecklists].forEach(cl=>{cl.enabled=cl.enabled!==false; cl.items=ensureArray(cl.items); cl.rules=cl.auto?normalizeRules(cl.rules):cl.rules; normalizeChecklistItems(cl.items);}); if(!p.current.mode)p.current.mode='build'; if(!p.current.clientId && p.clients[0])p.current.clientId=p.clients[0].id; if(!p.current.profileId){const pr=p.profiles.find(x=>profileAppliesToClient(x,p.current.clientId)); if(pr)p.current.profileId=pr.id;} if(!p.current.endpointId){const ep=p.endpoints.find(x=>x.clientId===p.current.clientId); if(ep)p.current.endpointId=ep.id;} return p;}
function normalizeRules(r){r=r||{}; r.include=r.include||{}; r.exclude=r.exclude||{}; ['tagIds','categoryIds','itemTypeIds','phaseIds','osIds','itemIds'].forEach(k=>{r.include[k]=ensureArray(r.include[k]); r.exclude[k]=ensureArray(r.exclude[k]);}); return r;}
function normalizeChecklistItems(items){ensureArray(items).forEach(i=>{i.id=i.id||uid('chk'); i.text=i.text||''; i.done=!!i.done; i.children=ensureArray(i.children); i.source=i.source||''; normalizeChecklistItems(i.children);});}
function applyTheme(){document.body.classList.toggle('light',project.preferences.theme==='light'); el('themeBtn').textContent=project.preferences.theme==='light'?'Light':'Dark';}
function renderAll(){applyTheme(); renderContextSelectors(); updateSaveState(); setPage(currentPage,false);}
function renderContextSelectors(){const clientSel=el('ctxClient'), profileSel=el('ctxProfile'), endpointSel=el('ctxEndpoint'), modeSel=el('ctxMode'); clientSel.innerHTML=project.clients.filter(enabled).sort(byName).map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`).join(''); clientSel.value=project.current.clientId; const profiles=project.profiles.filter(p=>enabled(p)&&profileAppliesToClient(p,project.current.clientId)).sort(byName); profileSel.innerHTML=profiles.map(p=>`<option value="${esc(p.id)}">${esc(p.name)}</option>`).join(''); if(!profiles.some(p=>p.id===project.current.profileId) && profiles[0]) project.current.profileId=profiles[0].id; profileSel.value=project.current.profileId; const endpoints=project.endpoints.filter(e=>enabled(e)&&e.clientId===project.current.clientId).sort(byName); endpointSel.innerHTML=endpoints.map(e=>`<option value="${esc(e.id)}">${esc(e.name)}</option>`).join(''); if(!endpoints.some(e=>e.id===project.current.endpointId) && endpoints[0]) project.current.endpointId=endpoints[0].id; endpointSel.value=project.current.endpointId; modeSel.innerHTML=MODES.map(m=>`<option value="${m.id}">${m.name}</option>`).join(''); modeSel.value=project.current.mode||'build';}
function renderPage(){renderContextSelectors(); ({dashboard:renderDashboard,clients:renderClients,profiles:renderProfiles,endpoints:renderEndpoints,items:renderItems,checklists:renderChecklists,outputs:renderOutputs,settings:renderSettings}[currentPage]||renderDashboard)();}

function renderDashboard(){const c=currentClient(), pr=currentProfile(), ep=currentEndpoint(); const h=el('dashboardContent'); const validation=validateProject(); h.innerHTML=`
 <div class="stat-row">
  ${stat('Clients',project.clients.filter(enabled).length,'clients')}${stat('Profiles',project.profiles.filter(enabled).length,'profiles')}${stat('Endpoints',project.endpoints.filter(enabled).length,'endpoints')}${stat('Repository Items',project.global.items.filter(enabled).length,'items')}${stat('Checklists',project.global.checklists.concat(project.clientChecklists).filter(enabled).length,'checklists')}${stat('Secrets',project.secrets.filter(enabled).length,'clients')}
 </div>
 <div class="grid two"><div class="card"><h3>Project File</h3>
  ${statusRow('Project container',projectFileName,dirty?'Unsaved changes are in memory until Save Project is used.':'Saved project file is current.')} 
  ${statusRow('Catalog + endpoint state','Inside .eforge container','The catalog, profiles, endpoints, checklists, settings, logs, and secrets are stored in one portable project file.')} 
  <div class="warningbox">The v8 .eforge file is a portable ZIP-style project container. It is not encrypted yet. Do not publish real secrets.</div>
 </div><div class="card"><h3>Current Context</h3>
  <p><b>Client:</b> ${esc(c?c.name:'None')}</p><p><b>Profile:</b> ${esc(pr?pr.name:'None')}</p><p><b>Endpoint:</b> ${esc(ep?ep.name:'None')}</p><p><b>Mode:</b> ${esc(nameOf(MODES,project.current.mode))}</p>
 </div></div>
 <div class="card"><h3>Project Health</h3>${validation.length?validation.map(v=>`<div class="status-row"><span><span class="pill ${v.level==='error'?'red':'amber'}">${esc(v.level)}</span> ${esc(v.message)}</span><button class="small" data-fix="${esc(v.page)}">Open</button></div>`).join(''):'<span class="pill green">No blocking validation issues found</span>'}</div>
 <div class="card"><h3>v8 Storage Model</h3><div class="helpbox">Endpoint Forge v8 uses one .eforge project container. Save buttons intentionally save to the project file or trigger a download. Browser recovery/autosave storage is not used.</div><pre class="output">Global: Operating Systems, Script Types, Phases, Item Types, Categories, Tags, Item Repository, Global Checklist Templates\nClient: Profiles, Endpoints, Client Checklists, Secrets\nEndpoint: Profile assignment, item overrides, completion state, history</pre></div>`; h.querySelectorAll('.stat.clickable').forEach(s=>s.addEventListener('click',()=>setPage(s.dataset.page))); h.querySelectorAll('[data-fix]').forEach(b=>b.addEventListener('click',()=>setPage(b.dataset.fix)));}
function stat(label,num,page){return `<div class="stat clickable" data-page="${page}"><div class="num">${num}</div><div class="lbl">${esc(label)}</div></div>`}
function statusRow(label,value,title){return `<div class="status-row"><span>${esc(label)}</span><span class="mono muted" title="${esc(title||value)}">${esc(value)}</span></div>`}

function renderClients(){const h=el('clientsContent'); const rows=project.clients.slice().sort(byName).map(c=>`<tr class="${selected.client===c.id?'selected':''}" data-id="${esc(c.id)}"><td><span class="linkish client-open">${esc(c.name)}</span></td><td>${c.enabled!==false?'<span class="pill green">Enabled</span>':'<span class="pill red">Disabled</span>'}</td><td>${project.profiles.filter(p=>p.clientIds.includes(c.id)).length}</td><td>${project.endpoints.filter(e=>e.clientId===c.id).length}</td><td class="row-actions"><button class="small toggle-client">${c.enabled!==false?'Disable':'Enable'}</button><button class="small edit-client">Edit</button></td></tr>`).join(''); h.innerHTML=`<div class="split"><div class="card"><h3>Clients</h3><div class="table-wrap"><table><thead><tr><th>Name</th><th>Status</th><th>Profiles</th><th>Endpoints</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div></div><div id="clientEditor">${renderClientEditor()}</div></div>`; h.querySelectorAll('tr[data-id]').forEach(r=>r.addEventListener('click',e=>{selected.client=r.dataset.id; renderClients();})); h.querySelectorAll('.toggle-client').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation(); const c=project.clients.find(x=>x.id===b.closest('tr').dataset.id); c.enabled=!enabled(c); markDirty(); renderAll();})); h.querySelectorAll('.edit-client,.client-open').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation(); selected.client=b.closest('tr').dataset.id; renderClients();})); bindClientEditor();}
function renderClientEditor(){let c=project.clients.find(x=>x.id===selected.client)||currentClient(); if(!c)return '<div class="card"><h3>Edit Client</h3><p class="muted">No client selected.</p></div>'; selected.client=c.id; return `<div class="card"><h3>Edit Client</h3><div class="form-grid"><div class="col-6"><label>Name</label><input id="clientName" value="${esc(c.name)}"></div><div class="col-3"><label>ID</label><input id="clientId" value="${esc(c.id)}" disabled></div><div class="col-3"><label>Status</label><select id="clientEnabled"><option value="true">Enabled</option><option value="false">Disabled</option></select></div><div class="col-12"><label>Notes</label><textarea id="clientNotes">${esc(c.notes||'')}</textarea></div><div class="col-12"><button id="saveClientForm" class="primary">Save Client</button></div></div></div><div class="card"><h3>Client Secrets</h3>${renderSecretTable(c.id)}</div>`;}
function bindClientEditor(){const b=el('saveClientForm'); if(b)b.onclick=()=>{const c=project.clients.find(x=>x.id===selected.client); c.name=el('clientName').value.trim()||c.name; c.enabled=el('clientEnabled').value==='true'; c.notes=el('clientNotes').value; markDirty(); renderAll();}; const se=el('clientEnabled'); if(se){const c=project.clients.find(x=>x.id===selected.client); se.value=String(enabled(c));} bindSecretTable();}
function renderSecretTable(clientId){const rows=project.secrets.filter(s=>s.clientId===clientId).sort(byName).map(s=>`<tr data-secret="${esc(s.id)}"><td><input data-sec-field="name" value="${esc(s.name)}"></td><td><input data-sec-field="label" value="${esc(s.label||'')}"></td><td><input data-sec-field="value" type="password" value="${esc(s.value||'')}"></td><td><input data-sec-field="notes" value="${esc(s.notes||'')}"></td><td><button class="small toggle-secret">${enabled(s)?'Disable':'Enable'}</button><button class="small danger delete-secret">Delete</button></td></tr>`).join(''); return `<button class="small" id="addSecretBtn">Add Secret</button><button class="small" id="sortSecretsBtn">Sort by Name</button><div class="table-wrap"><table><thead><tr><th>Name</th><th>Label</th><th>Value</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div><button class="primary small" id="saveSecretsBtn">Save Secrets</button>`;}
function bindSecretTable(){const add=el('addSecretBtn'); if(add)add.onclick=()=>{const c=project.clients.find(x=>x.id===selected.client)||currentClient(); project.secrets.push({id:uid('sec'),clientId:c.id,profileId:'',endpointId:'',name:'NEW_SECRET',label:'New Secret',value:'',enabled:true,notes:''}); markDirty(); renderClients();}; const sort=el('sortSecretsBtn'); if(sort)sort.onclick=()=>{project.secrets.sort((a,b)=>(a.clientId||'').localeCompare(b.clientId||'')||String(a.name||'').localeCompare(String(b.name||''))); markDirty(); renderClients();}; const save=el('saveSecretsBtn'); if(save)save.onclick=()=>{document.querySelectorAll('[data-secret]').forEach(r=>{const s=project.secrets.find(x=>x.id===r.dataset.secret); r.querySelectorAll('[data-sec-field]').forEach(inp=>s[inp.dataset.secField]=inp.value);}); markDirty(); renderClients();}; document.querySelectorAll('.toggle-secret').forEach(b=>b.onclick=e=>{const s=project.secrets.find(x=>x.id===b.closest('tr').dataset.secret); s.enabled=!enabled(s); markDirty(); renderClients();}); document.querySelectorAll('.delete-secret').forEach(b=>b.onclick=e=>{if(confirm('Delete this secret permanently?')){project.secrets=project.secrets.filter(x=>x.id!==b.closest('tr').dataset.secret); markDirty(); renderClients();}});}

function renderProfiles(){const h=el('profilesContent'); const list=project.profiles.filter(p=>profileAppliesToClient(p,project.current.clientId)).sort(byName); const rows=list.map(p=>`<tr data-id="${esc(p.id)}" class="${selected.profile===p.id?'selected':''}"><td><span class="linkish profile-open">${esc(p.name)}</span></td><td>${p.clientIds.map(id=>esc(nameOf(project.clients,id))).join(', ')}</td><td>${enabled(p)?'<span class="pill green">Enabled</span>':'<span class="pill red">Disabled</span>'}</td><td>${applicableItems(p,currentEndpoint()).length}</td><td class="row-actions"><button class="small toggle-profile">${enabled(p)?'Disable':'Enable'}</button><button class="small edit-profile">Edit</button></td></tr>`).join(''); h.innerHTML=`<div class="split"><div class="card"><h3>Profiles for ${esc(nameOf(project.clients,project.current.clientId))}</h3><div class="table-wrap"><table><thead><tr><th>Name</th><th>Clients</th><th>Status</th><th>Items</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div></div><div id="profileEditor">${renderProfileEditor()}</div></div>`; h.querySelectorAll('tr[data-id]').forEach(r=>r.onclick=()=>{selected.profile=r.dataset.id; renderProfiles();}); h.querySelectorAll('.toggle-profile').forEach(b=>b.onclick=e=>{e.stopPropagation(); const p=project.profiles.find(x=>x.id===b.closest('tr').dataset.id); p.enabled=!enabled(p); markDirty(); renderAll();}); bindProfileEditor();}
function profileAppliesToClient(p,clientId){return !clientId || ensureArray(p.clientIds).includes(clientId)}
function renderProfileEditor(){let p=project.profiles.find(x=>x.id===selected.profile)||currentProfile(); if(!p)return '<div class="card"><h3>Edit Profile</h3><p class="muted">No profile selected.</p></div>'; selected.profile=p.id; const preview=applicableItems(p,currentEndpoint()).map(i=>i.name).sort(); return `<div class="card"><h3>Edit Profile</h3><div class="form-grid"><div class="col-6"><label>Name</label><input id="profileName" value="${esc(p.name)}"></div><div class="col-3"><label>ID</label><input value="${esc(p.id)}" disabled></div><div class="col-3"><label>Status</label><select id="profileEnabled"><option value="true">Enabled</option><option value="false">Disabled</option></select></div><div class="col-12"><label>Assigned Clients</label>${multi('profileClients',project.clients,p.clientIds)}</div><div class="col-12">${renderRulesEditor('profileRules',p.rules)}</div><div class="col-12"><button id="saveProfileForm" class="primary">Save Profile</button></div></div></div><div class="card"><h3>Preview</h3><p class="muted">${preview.length} applicable repository items. Exclusions trump inclusions. Endpoint overrides are applied after profile rules.</p><div>${preview.map(x=>`<span class="pill">${esc(x)}</span>`).join('')||'<span class="pill amber">No items match</span>'}</div></div>`;}
function bindProfileEditor(){const p=project.profiles.find(x=>x.id===selected.profile); const en=el('profileEnabled'); if(en)en.value=String(enabled(p)); const b=el('saveProfileForm'); if(b)b.onclick=()=>{p.name=el('profileName').value.trim()||p.name; p.enabled=el('profileEnabled').value==='true'; p.clientIds=getMulti('profileClients'); p.rules=readRulesEditor('profileRules'); markDirty(); renderAll();};}

function renderEndpoints(){const h=el('endpointsContent'); const rows=project.endpoints.filter(e=>e.clientId===project.current.clientId).sort(byName).map(e=>`<tr data-id="${esc(e.id)}" class="${selected.endpoint===e.id?'selected':''}"><td><span class="linkish ep-open">${esc(e.name)}</span></td><td>${esc(nameOf(project.global.operatingSystems,e.osId))}</td><td>${esc(nameOf(project.profiles,e.profileId))}</td><td>${enabled(e)?'<span class="pill green">Enabled</span>':'<span class="pill red">Disabled</span>'}</td><td>${Object.keys(e.state.itemStatus||{}).length}</td><td class="row-actions"><button class="small toggle-endpoint">${enabled(e)?'Disable':'Enable'}</button><button class="small edit-endpoint">Edit</button></td></tr>`).join(''); h.innerHTML=`<div class="split"><div class="card"><h3>Endpoints</h3><div class="table-wrap"><table><thead><tr><th>Name</th><th>OS</th><th>Profile</th><th>Status</th><th>Tracked Items</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div></div><div>${renderEndpointEditor()}</div></div>`; h.querySelectorAll('tr[data-id]').forEach(r=>r.onclick=()=>{selected.endpoint=r.dataset.id; renderEndpoints();}); h.querySelectorAll('.toggle-endpoint').forEach(b=>b.onclick=e=>{e.stopPropagation(); const ep=project.endpoints.find(x=>x.id===b.closest('tr').dataset.id); ep.enabled=!enabled(ep); markDirty(); renderAll();}); bindEndpointEditor();}
function renderEndpointEditor(){let ep=project.endpoints.find(x=>x.id===selected.endpoint)||currentEndpoint(); if(!ep)return '<div class="card"><h3>Edit Endpoint</h3><p class="muted">No endpoint selected.</p></div>'; selected.endpoint=ep.id; const profs=project.profiles.filter(p=>profileAppliesToClient(p,ep.clientId)).sort(byName); return `<div class="card"><h3>Edit Endpoint</h3><div class="form-grid"><div class="col-5"><label>Name</label><input id="epName" value="${esc(ep.name)}"></div><div class="col-3"><label>Status</label><select id="epEnabled"><option value="true">Enabled</option><option value="false">Disabled</option></select></div><div class="col-4"><label>Operating System</label><select id="epOs">${project.global.operatingSystems.filter(enabled).sort(byName).map(o=>`<option value="${esc(o.id)}">${esc(o.name)}</option>`).join('')}</select></div><div class="col-6"><label>Profile</label><select id="epProfile">${profs.map(p=>`<option value="${esc(p.id)}">${esc(p.name)}</option>`).join('')}</select></div><div class="col-6"><label>Mode</label><select id="epMode">${MODES.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div><div class="col-6"><label>Endpoint Include Overrides</label>${multi('epIncludeItems',project.global.items,ep.overrides.includeItemIds)}</div><div class="col-6"><label>Endpoint Exclude Overrides</label>${multi('epExcludeItems',project.global.items,ep.overrides.excludeItemIds)}</div><div class="col-12"><button id="saveEndpointForm" class="primary">Save Endpoint</button><button id="addHistoryBtn">Add History Note</button></div></div></div><div class="card"><h3>History</h3>${renderHistory(ep)}</div>`;}

esc(it.notes||'')}</textarea></div><div class="col-12"><button id="saveItemForm" class="primary">Save Item</button></div></div></div><div class="card"><h3>Operating Systems, Manual Process, Disabled State, and Commands / Steps</h3>${osCards}</div>`;}
function renderOsActionEditor(it,os){const o=it.os[os.id]||{scriptTypeId:os.defaultScriptTypeId||'',manualProcess:false,disabled:false,actions:{}}; const actions=ACTION_TYPES.map(a=>`<div class="col-6"><label>${a}</label><textarea data-os="${esc(os.id)}" data-action="${esc(a)}" class="itAction">${esc(o.actions?.[a]||'')}</textarea></div>`).join(''); return `<div class="card"><div class="switchline"><b>${esc(os.name)}</b><label class="inline-check"><input type="checkbox" class="osManual" data-os="${esc(os.id)}" ${o.manualProcess?'checked':''}> Manual Process</label><label class="inline-check"><input type="checkbox" class="osDisabled" data-os="${esc(os.id)}" ${o.disabled?'checked':''}> Disabled for this Item</label><label style="width:220px">Script Type<select class="osScript" data-os="${esc(os.id)}">${project.global.scriptTypes.filter(enabled).sort(byName).map(s=>`<option value="${esc(s.id)}" ${o.scriptTypeId===s.id?'selected':''}>${esc(s.name)} (.${esc(s.extension)})</option>`).join('')}</select></label></div><div class="form-grid" style="margin-top:10px">${actions}</div></div>`;}

function renderChecklists(){const h=el('checklistsContent'); const lists=[...project.global.checklists.map(x=>({...x,_scope:'global'})),...project.clientChecklists.filter(c=>c.clientId===project.current.clientId).map(x=>({...x,_scope:'client'}))].sort(byName); const left=lists.map(c=>`<div class="list-row ${selected.checklist===c.id?'active':''}" data-id="${esc(c.id)}" data-scope="${c._scope}"><span>${esc(c.name)}</span><span>${c.auto?'<span class="pill blue">Auto</span>':'<span class="pill">Manual</span>'}</span></div>`).join(''); h.innerHTML=`<div class="split"><div class="card side-list"><h3>Checklists</h3>${left||'<p class="muted">No checklists.</p>'}</div><div>${renderChecklistEditor()}</div></div>`; h.querySelectorAll('.list-row').forEach(r=>r.onclick=()=>{selected.checklist=r.dataset.id; renderChecklists();}); bindChecklistEditor();}
function findChecklist(id){return project.global.checklists.find(c=>c.id===id)||project.clientChecklists.find(c=>c.id===id)}
function renderChecklistEditor(){let cl=findChecklist(selected.checklist) || project.clientChecklists.find(c=>c.clientId===project.current.clientId) || project.global.checklists[0]; if(!cl)return '<div class="card"><h3>Edit Checklist</h3><p class="muted">No checklist selected.</p></div>'; selected.checklist=cl.id; const rows=cl.auto?autoChecklistRows(cl):cl.items; return `<div class="card"><h3>Edit Checklist</h3><div class="form-grid"><div class="col-5"><label>Name</label><input id="clName" value="${esc(cl.name)}"></div><div class="col-3"><label>Status</label><select id="clEnabled"><option value="true">Enabled</option><option value="false">Disabled</option></select></div><div class="col-4"><label>Scope</label><input value="${project.global.checklists.some(x=>x.id===cl.id)?'Global Template':'Client Checklist'}" disabled></div><div class="col-12"><label>Notes</label><textarea id="clNotes">${esc(cl.notes||'')}</textarea></div>${cl.auto?`<div class="col-12">${renderRulesEditor('clRules',cl.rules)}</div>`:''}<div class="col-12"><button id="saveChecklistForm" class="primary">Save Checklist</button>${!cl.auto?'<button id="addCheckItemBtn">Add Root Item</button>':''}</div></div></div><div class="card"><h3>${cl.auto?'Generated Items':'Checklist Items'}</h3><div class="helpbox">Numbering updates automatically. Drag the six-dot handle to reorder. Drop onto the right side of another row to make it a child.</div>${renderCheckTree(rows,!cl.auto)}</div>`;}
function renderCheckTree(items,editable){const flat=[]; function walk(arr,path=[]){arr.forEach((i,idx)=>{const num=[...path,idx+1].join('.'); flat.push({item:i,num,depth:path.length}); walk(i.children||[],[...path,idx+1]);});} walk(items); if(!flat.length)return '<p class="muted">No checklist items.</p>'; return `<div class="check-tree">${flat.map(f=>`<div class="check-row" draggable="${editable}" data-chk="${esc(f.item.id)}"><span class="drag-handle" title="Drag to move">⠿</span><input type="checkbox" class="chkDone" ${f.item.done?'checked':''} ${editable?'':'disabled'}><span class="check-num">${esc(f.num)}</span><span><span class="indent-pad" style="width:${f.depth*18}px"></span>${esc(f.item.text)}</span><span class="source-text">${esc(f.item.source||f.item.sourceItemName||'Manual')}</span><span class="row-actions">${editable?'<button class="small edit-check">Edit</button><button class="small outdent-check">Outdent</button><button class="small indent-check">Indent</button><button class="small danger del-check">Delete</button>':''}</span></div>`).join('')}</div>`;}
function bindChecklistEditor(){const cl=findChecklist(selected.checklist); if(!cl)return; el('clEnabled').value=String(enabled(cl)); el('saveChecklistForm').onclick=()=>{cl.name=el('clName').value.trim()||cl.name; cl.enabled=el('clEnabled').value==='true'; cl.notes=el('clNotes').value; if(cl.auto)cl.rules=readRulesEditor('clRules'); markDirty(); renderChecklists();}; const add=el('addCheckItemBtn'); if(add)add.onclick=()=>{cl.items.push({id:uid('chk'),text:'New checklist item',done:false,children:[],source:'Manual'}); markDirty(); renderChecklists();}; document.querySelectorAll('.chkDone').forEach(cb=>cb.onchange=()=>{const i=findChecklistItem(cl.items,cb.closest('.check-row').dataset.chk); if(i){setDoneCascade(i,cb.checked); addEndpointHistoryForChecklist(i, cb.checked); markDirty(); renderChecklists();}}); document.querySelectorAll('.edit-check').forEach(b=>b.onclick=()=>{const i=findChecklistItem(cl.items,b.closest('.check-row').dataset.chk); const t=prompt('Checklist item text:',i.text); if(t!==null){i.text=t; markDirty(); renderChecklists();}}); document.querySelectorAll('.del-check').forEach(b=>b.onclick=()=>{if(confirm('Delete this checklist item permanently?')){removeChecklistItem(cl.items,b.closest('.check-row').dataset.chk); markDirty(); renderChecklists();}}); document.querySelectorAll('.indent-check').forEach(b=>b.onclick=()=>{indentChecklistItem(cl.items,b.closest('.check-row').dataset.chk); markDirty(); renderChecklists();}); document.querySelectorAll('.outdent-check').forEach(b=>b.onclick=()=>{outdentChecklistItem(cl.items,b.closest('.check-row').dataset.chk); markDirty(); renderChecklists();}); document.querySelectorAll('.check-row[draggable="true"]').forEach(r=>{r.ondragstart=e=>{draggedChecklistId=r.dataset.chk; e.dataTransfer.effectAllowed='move';}; r.ondragover=e=>{e.preventDefault(); r.classList.add('drag-over');}; r.ondragleave=()=>r.classList.remove('drag-over'); r.ondrop=e=>{e.preventDefault(); r.classList.remove('drag-over'); if(!draggedChecklistId||draggedChecklistId===r.dataset.chk)return; const node=removeChecklistItem(cl.items,draggedChecklistId); if(!node)return; const asChild=e.offsetX>120; if(asChild){const target=findChecklistItem(cl.items,r.dataset.chk); target.children=target.children||[]; target.children.push(node);}else{insertBeforeChecklistItem(cl.items,r.dataset.chk,node);} draggedChecklistId=null; markDirty(); renderChecklists();};});}
function autoChecklistRows(cl){const items=itemsMatchingRules(cl.rules).sort(byName); return items.map(it=>({id:'auto-'+it.id,text:it.name,done:false,children:[],source:'Item Repository: '+it.name,sourceItemId:it.id}));}
function findChecklistItem(items,id){for(const i of items){if(i.id===id)return i; const c=findChecklistItem(i.children||[],id); if(c)return c;} return null;}
function removeChecklistItem(items,id){for(let idx=0;idx<items.length;idx++){if(items[idx].id===id)return items.splice(idx,1)[0]; const c=removeChecklistItem(items[idx].children||[],id); if(c)return c;} return null;}
function insertBeforeChecklistItem(items,targetId,node){for(let idx=0;idx<items.length;idx++){if(items[idx].id===targetId){items.splice(idx,0,node); return true;} if(insertBeforeChecklistItem(items[idx].children||[],targetId,node)) return true;} items.push(node); return true;}
function findParentInfo(items,id,parent=null){for(let idx=0;idx<items.length;idx++){if(items[idx].id===id)return {parent,items,index:idx,item:items[idx]}; const c=findParentInfo(items[idx].children||[],id,items[idx]); if(c)return c;} return null;}
function indentChecklistItem(items,id){const info=findParentInfo(items,id); if(!info||info.index===0)return; const node=info.items.splice(info.index,1)[0]; const prev=info.items[info.index-1]; prev.children=prev.children||[]; prev.children.push(node);}
function outdentChecklistItem(items,id){const info=findParentInfo(items,id); if(!info||!info.parent)return; const parentInfo=findParentInfo(items,info.parent.id); const node=info.items.splice(info.index,1)[0]; parentInfo.items.splice(parentInfo.index+1,0,node);}
function setDoneCascade(i,done){i.done=done; (i.children||[]).forEach(c=>setDoneCascade(c,done));}
function addEndpointHistoryForChecklist(i,done){const ep=currentEndpoint(); if(!ep)return; ep.state.history.push({timestamp:new Date().toISOString(),mode:project.current.mode,itemId:i.sourceItemId||'',status:done?'completed':'unchecked',notes:'Checklist: '+(i.text||'')});}

function renderOutputs(){const h=el('outputsContent'); const ep=currentEndpoint(), pr=currentProfile(); const applicable=applicableItems(pr,ep); h.innerHTML=`<div class="grid two"><div class="card"><h3>Output Context</h3><p><b>Client:</b> ${esc(nameOf(project.clients,project.current.clientId))}</p><p><b>Profile:</b> ${esc(pr?pr.name:'None')}</p><p><b>Endpoint:</b> ${esc(ep?ep.name:'None')}</p><p><b>Mode:</b> ${esc(nameOf(MODES,project.current.mode))}</p><p><b>Repository Items:</b> ${applicable.length}</p></div><div class="card"><h3>Generation Rules</h3><div class="helpbox">Generated outputs are built from Profile rules first, then Endpoint include/exclude overrides. Disabled items and disabled per-item OS sections are not generated.</div></div></div><div class="card"><h3>Preview</h3><pre class="output" id="outputPreview">${esc(outputCache.length?outputCache.map(o=>'### '+o.name+'\n'+o.content).join('\n\n'):'Click Generate Preview.')}</pre></div>`;}
function generateOutputs(){const ep=currentEndpoint(), pr=currentProfile(); const mode=MODES.find(m=>m.id===project.current.mode)||MODES[0]; const items=applicableItems(pr,ep); const files=[]; const osList=project.global.operatingSystems.filter(enabled); const scriptTypes=project.global.scriptTypes.filter(enabled); osList.forEach(os=>{scriptTypes.forEach(st=>{let lines=[]; items.forEach(it=>{const osdata=it.os?.[os.id]; if(!osdata||osdata.disabled)return; const actionLines=[]; mode.actions.forEach(a=>{const cmd=osdata.actions?.[a]; if(cmd)actionLines.push(`\n# ${it.name} - ${a}\n${cmd}`);}); if(actionLines.length)lines.push(`# ===== ${it.name} =====\n`+actionLines.join('\n')); if(osdata.manualProcess)lines.push(`# MANUAL PROCESS: ${it.name}\n# ${it.description||'Manual process required.'}`);}); if(lines.length)files.push({name:`${project.current.mode}-${os.id}.${st.extension||'txt'}`,content:lines.join('\n\n')+'\n'});});}); files.push({name:'runbook.txt',content:buildRunbook(items)}); outputCache=files; renderOutputs();}
function buildRunbook(items){return `Endpoint Forge Runbook\nVersion: ${VERSION}\nGenerated: ${new Date().toISOString()}\nClient: ${nameOf(project.clients,project.current.clientId)}\nProfile: ${nameOf(project.profiles,project.current.profileId)}\nEndpoint: ${nameOf(project.endpoints,project.current.endpointId)}\nMode: ${nameOf(MODES,project.current.mode)}\n\nIncluded Repository Items:\n${items.map(i=>'- '+i.name+' ['+(i.status||'active')+']').join('\n')}\n\nWarnings:\n- Secrets are emitted as placeholders by default.\n- Review all generated commands before execution.\n`;}

function renderSettings(){const h=el('settingsContent'); const tabs=[['operatingSystems','Operating Systems'],['scriptTypes','Script Types'],['phases','Phases'],['itemTypes','Item Types'],['categories','Categories'],['tags','Tags']]; h.innerHTML=`<div class="tabbar">${tabs.map(t=>`<button class="${selected.settingsTab===t[0]?'active':''}" data-tab="${t[0]}">${t[1]}</button>`).join('')}</div><div id="settingsPanel"></div>`; h.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{selected.settingsTab=b.dataset.tab; renderSettings();}); renderSettingsPanel();}
function renderSettingsPanel(){const key=selected.settingsTab; const panel=el('settingsPanel'); if(!panel)return; const titles={operatingSystems:'Operating Systems',scriptTypes:'Script Types',phases:'Phases',itemTypes:'Item Types',categories:'Categories',tags:'Tags'}; const arr=project.global[key]; let extra=''; if(key==='operatingSystems')extra='<th>Default Script Type</th>'; if(key==='scriptTypes')extra='<th>Extension</th>'; if(key==='phases')extra='<th>Order</th>'; const rows=arr.map(x=>`<tr data-id="${esc(x.id)}"><td><input data-field="name" value="${esc(x.name)}"></td>${key==='operatingSystems'?`<td><select data-field="defaultScriptTypeId">${project.global.scriptTypes.sort(byName).map(s=>`<option value="${esc(s.id)}" ${x.defaultScriptTypeId===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select></td>`:''}${key==='scriptTypes'?`<td><input data-field="extension" value="${esc(x.extension||'')}"></td>`:''}${key==='phases'?`<td><input data-field="order" type="number" value="${esc(x.order||0)}"></td>`:''}<td>${enabled(x)?'<span class="pill green">Enabled</span>':'<span class="pill red">Disabled</span>'}</td><td class="row-actions"><button class="small toggle-setting">${enabled(x)?'Disable':'Enable'}</button><button class="small danger delete-setting">Delete</button></td></tr>`).join(''); panel.innerHTML=`<div class="card"><h3>${titles[key]}</h3><div class="row-actions" style="margin-bottom:10px"><button id="addSettingRow">Add</button><button id="sortSettingRows">Sort by Name</button><button id="saveSettingRows" class="primary">Save ${titles[key]}</button></div><div class="table-wrap"><table><thead><tr><th>Name</th>${extra}<th>Status</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div></div>`; el('addSettingRow').onclick=()=>{arr.push(defaultSetting(key)); markDirty(); renderSettings();}; el('sortSettingRows').onclick=()=>{arr.sort(byName); markDirty(); renderSettings();}; el('saveSettingRows').onclick=()=>{panel.querySelectorAll('tr[data-id]').forEach(r=>{const o=arr.find(x=>x.id===r.dataset.id); r.querySelectorAll('[data-field]').forEach(inp=>{let v=inp.value; if(inp.dataset.field==='order')v=Number(v)||0; o[inp.dataset.field]=v;});}); markDirty(); renderAll();}; panel.querySelectorAll('.toggle-setting').forEach(b=>b.onclick=()=>{const o=arr.find(x=>x.id===b.closest('tr').dataset.id); o.enabled=!enabled(o); markDirty(); renderSettings();}); panel.querySelectorAll('.delete-setting').forEach(b=>b.onclick=()=>{const id=b.closest('tr').dataset.id; if(confirm('Delete this permanently? References will be validation warnings if still used.')){project.global[key]=arr.filter(x=>x.id!==id); markDirty(); renderSettings();}});}
function defaultSetting(key){const id=uid(key.slice(0,3)); const o={id,name:'New '+key.slice(0,-1),enabled:true}; if(key==='scriptTypes')o.extension='txt'; if(key==='operatingSystems')o.defaultScriptTypeId=project.global.scriptTypes[0]?.id||''; if(key==='phases')o.order=50; return o;}

function renderRulesEditor(prefix,rules){rules=normalizeRules(rules); return `<div class="card"><h4>Inclusion Rules</h4><div class="form-grid"><div class="col-4"><label>Include Item Types</label>${multi(prefix+'IncTypes',project.global.itemTypes,rules.include.itemTypeIds)}</div><div class="col-4"><label>Include Categories</label>${multi(prefix+'IncCats',project.global.categories,rules.include.categoryIds)}</div><div class="col-4"><label>Include Tags</label>${multi(prefix+'IncTags',project.global.tags,rules.include.tagIds)}</div><div class="col-4"><label>Include Phases</label>${multi(prefix+'IncPhases',project.global.phases,rules.include.phaseIds)}</div><div class="col-4"><label>Include OS</label>${multi(prefix+'IncOs',project.global.operatingSystems,rules.include.osIds)}</div><div class="col-4"><label>Include Specific Items</label>${multi(prefix+'IncItems',project.global.items,rules.include.itemIds)}</div></div><h4 style="margin-top:12px">Exclusion Rules</h4><div class="form-grid"><div class="col-4"><label>Exclude Item Types</label>${multi(prefix+'ExcTypes',project.global.itemTypes,rules.exclude.itemTypeIds)}</div><div class="col-4"><label>Exclude Categories</label>${multi(prefix+'ExcCats',project.global.categories,rules.exclude.categoryIds)}</div><div class="col-4"><label>Exclude Tags</label>${multi(prefix+'ExcTags',project.global.tags,rules.exclude.tagIds)}</div><div class="col-4"><label>Exclude Phases</label>${multi(prefix+'ExcPhases',project.global.phases,rules.exclude.phaseIds)}</div><div class="col-4"><label>Exclude OS</label>${multi(prefix+'ExcOs',project.global.operatingSystems,rules.exclude.osIds)}</div><div class="col-4"><label>Exclude Specific Items</label>${multi(prefix+'ExcItems',project.global.items,rules.exclude.itemIds)}</div></div></div>`;}
function readRulesEditor(prefix){return {include:{itemTypeIds:getMulti(prefix+'IncTypes'),categoryIds:getMulti(prefix+'IncCats'),tagIds:getMulti(prefix+'IncTags'),phaseIds:getMulti(prefix+'IncPhases'),osIds:getMulti(prefix+'IncOs'),itemIds:getMulti(prefix+'IncItems')},exclude:{itemTypeIds:getMulti(prefix+'ExcTypes'),categoryIds:getMulti(prefix+'ExcCats'),tagIds:getMulti(prefix+'ExcTags'),phaseIds:getMulti(prefix+'ExcPhases'),osIds:getMulti(prefix+'ExcOs'),itemIds:getMulti(prefix+'ExcItems')}};}
function multi(id,list,vals){vals=ensureArray(vals); const opts=ensureArray(list).filter(enabled).sort(byName).map(x=>`<option value="${esc(x.id)}" ${vals.includes(x.id)?'selected':''}>${esc(x.name)}</option>`).join(''); return `<select multiple size="5" id="${esc(id)}">${opts}</select>`;}
function getMulti(id){return Array.from(el(id)?.selectedOptions||[]).map(o=>o.value)}
function itemsMatchingRules(rules){rules=normalizeRules(rules); return project.global.items.filter(item=>itemAvailable(item) && includedByRules(item,rules) && !excludedByRules(item,rules));}
function includedByRules(item,r){const inc=r.include; const has=Object.values(inc).some(a=>a.length); if(!has)return true; return matchAny(item,inc);}
function excludedByRules(item,r){return matchAny(item,r.exclude);}
function matchAny(item,rule){if(rule.itemIds?.includes(item.id))return true; if(rule.itemTypeIds?.includes(item.itemTypeId))return true; if(item.categoryIds?.some(id=>rule.categoryIds?.includes(id)))return true; if(item.tagIds?.some(id=>rule.tagIds?.includes(id)))return true; if(item.phaseIds?.some(id=>rule.phaseIds?.includes(id)))return true; if(Object.keys(item.os||{}).some(id=>rule.osIds?.includes(id)))return true; return false;}
function itemAvailable(i){return enabled(i)&&!['disabled','archived'].includes(i.status||'active');}
function applicableItems(profile,endpoint){let base=profile?itemsMatchingRules(profile.rules):project.global.items.filter(itemAvailable); if(endpoint){endpoint.overrides.includeItemIds.forEach(id=>{const i=project.global.items.find(x=>x.id===id&&itemAvailable(x)); if(i&&!base.some(b=>b.id===id))base.push(i);}); base=base.filter(i=>!endpoint.overrides.excludeItemIds.includes(i.id));} return base.sort(byName);}
function validateProject(){const v=[]; project.global.items.forEach(i=>{Object.keys(i.os||{}).forEach(osid=>{if(!project.global.operatingSystems.some(o=>o.id===osid))v.push({level:'error',message:`Item "${i.name}" references missing OS: ${osid}`,page:'items'});}); if(itemAvailable(i)&&!Object.values(i.os||{}).some(o=>Object.keys(o.actions||{}).length||o.manualProcess))v.push({level:'warn',message:`Item "${i.name}" has no commands or manual process.`,page:'items'}); ensureArray(i.secrets).forEach(sec=>{const has=project.secrets.some(s=>s.name===sec && (!s.clientId || s.clientId===project.current.clientId)); if(!has)v.push({level:'warn',message:`Item "${i.name}" references missing secret placeholder: ${sec}`,page:'clients'});});}); project.profiles.filter(enabled).forEach(p=>{if(applicableItems(p,null).length===0)v.push({level:'warn',message:`Profile "${p.name}" currently matches zero repository items.`,page:'profiles'});}); project.endpoints.forEach(e=>[...e.overrides.includeItemIds,...e.overrides.excludeItemIds].forEach(id=>{if(!project.global.items.some(i=>i.id===id))v.push({level:'warn',message:`Endpoint "${e.name}" references deleted item: ${id}`,page:'endpoints'});})); return v;}

async function openProject(){try{if(window.showOpenFilePicker){const [handle]=await window.showOpenFilePicker({types:[{description:'Endpoint Forge Project',accept:{'application/octet-stream':['.eforge'],'application/json':['.json']}}]}); const file=await handle.getFile(); projectFileHandle=handle; projectFileName=file.name; await loadFile(file); markSaved();}else{el('openProjectInput').click();}}catch(err){if(err.name!=='AbortError')alert('Open failed: '+err.message);}}
async function loadFile(file){const buf=await file.arrayBuffer(); let loaded; if(file.name.toLowerCase().endsWith('.eforge')){const files=readZipStored(new Uint8Array(buf)); const data=files['project.json'] || files['catalog.json'] || files['manifest.json']; if(!data)throw new Error('No project.json found in .eforge container.'); loaded=JSON.parse(new TextDecoder().decode(data));}else{loaded=JSON.parse(new TextDecoder().decode(new Uint8Array(buf)));} project=normalizeProject(loaded.project||loaded); applyTheme(); renderAll();}
async function saveProject(saveAs=false){try{const bytes=makeEforge(project); if(window.showSaveFilePicker && (saveAs || !projectFileHandle)){projectFileHandle=await window.showSaveFilePicker({suggestedName:projectFileName||'endpoint-forge.eforge',types:[{description:'Endpoint Forge Project',accept:{'application/octet-stream':['.eforge']}}]});} if(projectFileHandle){const writable=await projectFileHandle.createWritable(); await writable.write(new Blob([bytes],{type:'application/octet-stream'})); await writable.close(); projectFileName=projectFileHandle.name||projectFileName; markSaved(); renderPage();}else{downloadBytes(projectFileName||'endpoint-forge.eforge',bytes,'application/octet-stream'); markSaved(); renderPage();}}catch(err){if(err.name!=='AbortError')alert('Save failed: '+err.message);}}
function makeEforge(p){const now=new Date().toISOString(); const manifest={format:'endpoint-forge-project',version:VERSION,createdBy:'Endpoint Forge',savedAt:now,encrypted:false,files:['project.json']}; return makeZip([{name:'manifest.json',content:JSON.stringify(manifest,null,2)},{name:'project.json',content:JSON.stringify(p,null,2)}]);}
function downloadBytes(name,bytes,type){const blob=bytes instanceof Blob?bytes:new Blob([bytes],{type:type||'application/octet-stream'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},800);}
function downloadOutputs(){if(!outputCache.length)generateOutputs(); const bytes=makeZip(outputCache); downloadBytes(`endpoint-forge-${project.current.clientId}-${project.current.endpointId}-${project.current.mode}.zip`,bytes,'application/zip');}
function blankSlate(){if(!confirm('Blank Slate will remove all project data, sample data, settings, clients, profiles, endpoints, secrets, and unsaved work from memory. Continue?'))return; const typed=prompt('Type BLANK SLATE to permanently reset the current in-memory project.'); if(typed!=='BLANK SLATE')return; project=blankProject(); projectFileHandle=null; projectFileName='endpoint-forge.eforge'; selected={client:null,profile:null,endpoint:null,item:null,checklist:null,settingsTab:'operatingSystems'}; markDirty(); renderAll();}
function loadSample(){if(dirty && !confirm('Load sample data will replace the current in-memory project. Continue?'))return; project=sampleProject(); projectFileHandle=null; projectFileName='endpoint-forge-sample.eforge'; selected={client:null,profile:null,endpoint:null,item:null,checklist:null,settingsTab:'operatingSystems'}; markDirty(); renderAll();}

function makeZip(files){const enc=new TextEncoder(); const out=[]; const central=[]; let offset=0; const push=(arr,...vals)=>vals.forEach(v=>arr.push(v&255)); const push16=(arr,v)=>{push(arr,v,v>>8)}; const push32=(arr,v)=>{push(arr,v,v>>8,v>>16,v>>24)}; files.forEach(f=>{const nameBytes=enc.encode(f.name); const data=typeof f.content==='string'?enc.encode(f.content):f.content; const crc=crc32(data); const local=[]; push32(local,0x04034b50); push16(local,20); push16(local,0); push16(local,0); push16(local,0); push16(local,0); push32(local,crc); push32(local,data.length); push32(local,data.length); push16(local,nameBytes.length); push16(local,0); local.push(...nameBytes,...data); out.push(...local); const c=[]; push32(c,0x02014b50); push16(c,20); push16(c,20); push16(c,0); push16(c,0); push16(c,0); push16(c,0); push32(c,crc); push32(c,data.length); push32(c,data.length); push16(c,nameBytes.length); push16(c,0); push16(c,0); push16(c,0); push16(c,0); push32(c,0); push32(c,offset); c.push(...nameBytes); central.push(...c); offset+=local.length; }); const centralStart=out.length; out.push(...central); const end=[]; push32(end,0x06054b50); push16(end,0); push16(end,0); push16(end,files.length); push16(end,files.length); push32(end,central.length); push32(end,centralStart); push16(end,0); out.push(...end); return new Uint8Array(out);}
function readZipStored(bytes){const dec=new TextDecoder(); const files={}; let off=0; const u16=o=>bytes[o]|(bytes[o+1]<<8); const u32=o=>(bytes[o]|(bytes[o+1]<<8)|(bytes[o+2]<<16)|(bytes[o+3]<<24))>>>0; while(off+30<bytes.length && u32(off)===0x04034b50){const method=u16(off+8), comp=u32(off+18), nameLen=u16(off+26), extraLen=u16(off+28); const name=dec.decode(bytes.slice(off+30,off+30+nameLen)); const start=off+30+nameLen+extraLen; if(method!==0)throw new Error('Unsupported .eforge compression method. Save the project from Endpoint Forge v8.'); files[name]=bytes.slice(start,start+comp); off=start+comp;} return files;}
let crcTable=null; function crc32(data){if(!crcTable){crcTable=Array.from({length:256},(_,n)=>{let c=n; for(let k=0;k<8;k++)c=(c&1)?(0xedb88320^(c>>>1)):(c>>>1); return c>>>0;});} let c=0xffffffff; for(const b of data)c=crcTable[(c^b)&255]^(c>>>8); return (c^0xffffffff)>>>0;}

function showModal(title,body,small=false){const host=el('modalHost'); host.innerHTML=`<div class="modal ${small?'small':''}"><div class="modal-header"><div class="modal-title">${esc(title)}</div><button class="close-x" aria-label="Close">×</button></div><div class="modal-body">${body}</div><div class="modal-footer"><button class="primary modal-close">Close</button></div></div>`; host.classList.add('show'); host.querySelectorAll('.close-x,.modal-close').forEach(b=>b.onclick=()=>host.classList.remove('show'));}
function showChangeLog(){showModal('Change Log',`<h4>v8.0.0</h4><p>Major schema reset. Added .eforge portable project container, client/profile/endpoint model, Item Repository actions, endpoint history, client secrets, global settings, manual Save Project workflow, and no browser recovery storage.</p><h4>v7.1.0</h4><p>Added script type settings, theme toggle, sort controls, profile/checklist cloning improvements, and relationship review groundwork.</p><h4>v7.0.0</h4><p>Architecture review implementation using the current UI theme.</p><h4>v6.9.x</h4><p>Hardened hosted site behavior, blank slate, sample data, corrected change log handling, and clarified save states.</p><h4>v6.x</h4><p>Endpoint Forge rename, generated outputs, settings consolidation, validation, checklists, and profile logic.</p>`,true);}
function showPageContext(){showModal('Page Context',`<p><b>${esc(currentPage)}</b> is influenced by the selected Client, Profile, Endpoint, and Mode where applicable.</p><p>v8 uses a portable .eforge project container. Changes remain unsaved until a Save Project button is used.</p><p>Disabled records remain in the project but are unavailable to normal workflows. Deleted records are permanently removed from the project.</p>`,true);}
function showLicense(){showModal('License',`<p>Endpoint Forge is intended to be published under <b>AGPL-3.0-or-later</b>.</p><p>When publishing source, include the full GNU Affero General Public License v3.0 license text and provide complete corresponding source for users interacting with the hosted application.</p><p>This HTML includes an SPDX license identifier and no external runtime dependencies.</p>`,true);}

function wireEvents(){document.querySelectorAll('.nav-item').forEach(n=>n.onclick=()=>setPage(n.dataset.page)); el('ctxClient').onchange=()=>{project.current.clientId=el('ctxClient').value; const prof=project.profiles.find(p=>profileAppliesToClient(p,project.current.clientId)); project.current.profileId=prof?.id||''; const ep=project.endpoints.find(e=>e.clientId===project.current.clientId); project.current.endpointId=ep?.id||''; markDirty(); renderAll();}; el('ctxProfile').onchange=()=>{project.current.profileId=el('ctxProfile').value; const ep=currentEndpoint(); if(ep)ep.profileId=project.current.profileId; markDirty(); renderAll();}; el('ctxEndpoint').onchange=()=>{project.current.endpointId=el('ctxEndpoint').value; const ep=currentEndpoint(); if(ep){project.current.profileId=ep.profileId||project.current.profileId; project.current.mode=ep.mode||project.current.mode;} markDirty(); renderAll();}; el('ctxMode').onchange=()=>{project.current.mode=el('ctxMode').value; const ep=currentEndpoint(); if(ep)ep.mode=project.current.mode; markDirty(); renderAll();}; el('themeBtn').onclick=()=>{project.preferences.theme=project.preferences.theme==='light'?'dark':'light'; applyTheme(); markDirty();}; el('saveTop').onclick=()=>saveProject(false); el('openProjectBtn').onclick=openProject; el('openProjectInput').onchange=e=>{const f=e.target.files[0]; if(f){projectFileName=f.name; projectFileHandle=null; loadFile(f).then(()=>{markSaved(); renderAll();}).catch(err=>alert('Open failed: '+err.message));}}; ['saveProjectDash','saveClientsBtn','saveProfilesBtn','saveEndpointsBtn','saveItemsBtn','saveChecklistsBtn','saveOutputsBtn','saveSettingsBtn'].forEach(id=>{const b=el(id); if(b)b.onclick=()=>saveProject(false);}); el('saveProjectAsDash').onclick=()=>saveProject(true); el('loadSampleBtn').onclick=loadSample; el('blankSlateBtn').onclick=blankSlate; el('changeLogBtn').onclick=showChangeLog; el('pageContextBtn').onclick=showPageContext; el('licenseBtn').onclick=showLicense;
 el('addClientBtn').onclick=()=>{const id=uid('client'); project.clients.push({id,name:'New Client',enabled:true,notes:''}); selected.client=id; project.current.clientId=id; markDirty(); renderAll();}; el('cloneClientBtn').onclick=()=>{const c=currentClient(); if(!c)return; const n=clone(c); n.id=uid('client'); n.name=c.name+' Copy'; project.clients.push(n); selected.client=n.id; markDirty(); renderAll();}; el('deleteClientBtn').onclick=()=>{const c=project.clients.find(x=>x.id===selected.client)||currentClient(); if(c&&confirm('Delete client permanently? Profiles, endpoints, client checklists, and secrets for this client will also be removed.')){project.clients=project.clients.filter(x=>x.id!==c.id); project.profiles=project.profiles.filter(p=>!p.clientIds.includes(c.id)); project.endpoints=project.endpoints.filter(e=>e.clientId!==c.id); project.clientChecklists=project.clientChecklists.filter(ch=>ch.clientId!==c.id); project.secrets=project.secrets.filter(s=>s.clientId!==c.id); project.current.clientId=project.clients[0]?.id||''; markDirty(); renderAll();}}; el('sortClientsBtn').onclick=()=>{project.clients.sort(byName); markDirty(); renderAll();};
 el('addProfileBtn').onclick=()=>{const id=uid('profile'); project.profiles.push({id,name:'New Profile',enabled:true,clientIds:[project.current.clientId].filter(Boolean),rules:emptyRules()}); selected.profile=id; markDirty(); renderProfiles();}; el('cloneProfileBtn').onclick=()=>{const p=project.profiles.find(x=>x.id===selected.profile)||currentProfile(); if(!p)return; const clientId=prompt('Clone to client ID:',project.current.clientId); if(clientId && project.clients.some(c=>c.id===clientId)){const n=clone(p); n.id=uid('profile'); n.name=p.name+' Copy'; n.clientIds=[clientId]; project.profiles.push(n); selected.profile=n.id; markDirty(); renderAll();}}; el('deleteProfileBtn').onclick=()=>{const p=project.profiles.find(x=>x.id===selected.profile)||currentProfile(); if(p&&confirm('Delete profile permanently?')){project.profiles=project.profiles.filter(x=>x.id!==p.id); project.endpoints.forEach(e=>{if(e.profileId===p.id)e.profileId='';}); markDirty(); renderAll();}}; el('sortProfilesBtn').onclick=()=>{project.profiles.sort(byName); markDirty(); renderAll();};
 el('addEndpointBtn').onclick=()=>{const id=uid('endpoint'); project.endpoints.push({id,clientId:project.current.clientId,name:'New Endpoint',enabled:true,profileId:project.current.profileId,osId:project.global.operatingSystems[0]?.id||'',mode:project.current.mode,overrides:{includeItemIds:[],excludeItemIds:[],deprecatedItemIds:[]},state:{itemStatus:{},history:[]}}); selected.endpoint=id; project.current.endpointId=id; markDirty(); renderAll();}; el('cloneEndpointBtn').onclick=()=>{const ep=currentEndpoint(); if(!ep)return; const n=clone(ep); n.id=uid('endpoint'); n.name=ep.name+' Copy'; n.state={itemStatus:{},history:[]}; project.endpoints.push(n); selected.endpoint=n.id; markDirty(); renderAll();}; el('deleteEndpointBtn').onclick=()=>{const ep=project.endpoints.find(x=>x.id===selected.endpoint)||currentEndpoint(); if(ep&&confirm('Delete endpoint permanently including its local history/state?')){project.endpoints=project.endpoints.filter(x=>x.id!==ep.id); markDirty(); renderAll();}}; el('sortEndpointsBtn').onclick=()=>{project.endpoints.sort(byName); markDirty(); renderAll();};
 el('itemSearch').oninput=renderItems; el('itemFilterType').onchange=renderItems; el('itemFilterStatus').onchange=renderItems; el('addItemBtn').onclick=()=>{const id=uid('item'); project.global.items.push({id,name:'New Repository Item',enabled:true,status:'active',itemTypeId:project.global.itemTypes[0]?.id||'',categoryIds:[],tagIds:[],phaseIds:[],secrets:[],dependencies:[],risk:'medium',requiresAdmin:false,requiresReboot:false,description:'',notes:'',sourceUrl:'',testedOs:'',os:{}}); selected.item=id; markDirty(); renderItems();}; el('cloneItemBtn').onclick=()=>{const it=project.global.items.find(x=>x.id===selected.item); if(!it)return; const n=clone(it); n.id=uid('item'); n.name=it.name+' Copy'; project.global.items.push(n); selected.item=n.id; markDirty(); renderItems();}; el('deleteItemBtn').onclick=()=>{const it=project.global.items.find(x=>x.id===selected.item); if(it&&confirm('Delete repository item permanently?')){project.global.items=project.global.items.filter(x=>x.id!==it.id); markDirty(); renderItems();}};
 el('addChecklistBtn').onclick=()=>{const id=uid('checklist'); project.clientChecklists.push({id,clientId:project.current.clientId,name:'New Client Checklist',enabled:true,auto:false,items:[],rules:null,notes:''}); selected.checklist=id; markDirty(); renderChecklists();}; el('addAutoChecklistBtn').onclick=()=>{const id=uid('checklist'); project.global.checklists.push({id,name:'New Auto Checklist',enabled:true,auto:true,scope:'global',rules:emptyRules(),items:[],notes:''}); selected.checklist=id; markDirty(); renderChecklists();}; el('cloneChecklistBtn').onclick=()=>{const cl=findChecklist(selected.checklist); if(!cl)return; const clientId=prompt('Clone checklist to client ID:',project.current.clientId); if(clientId && project.clients.some(c=>c.id===clientId)){const n=clone(cl); n.id=uid('checklist'); n.name=cl.name+' Copy'; n.clientId=clientId; project.clientChecklists.push(n); selected.checklist=n.id; markDirty(); renderChecklists();}}; el('deleteChecklistBtn').onclick=()=>{const cl=findChecklist(selected.checklist); if(cl&&confirm('Delete checklist permanently?')){project.global.checklists=project.global.checklists.filter(x=>x.id!==cl.id); project.clientChecklists=project.clientChecklists.filter(x=>x.id!==cl.id); markDirty(); renderChecklists();}}; el('sortChecklistsBtn').onclick=()=>{project.global.checklists.sort(byName); project.clientChecklists.sort(byName); markDirty(); renderChecklists();}; el('generateOutputsBtn').onclick=generateOutputs; el('downloadOutputsBtn').onclick=downloadOutputs;}

function init(){project=sampleProject(); projectFileName='endpoint-forge-sample.eforge'; markDirty(); wireEvents(); setPage(location.hash.slice(1)||'dashboard',false); renderAll();}
init();
</script>
